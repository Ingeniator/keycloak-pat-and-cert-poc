# HTTP redirect to HTTPS
server {
    listen 80;
    server_name localhost keycloak.local;
    return 301 https://$host$request_uri;
}

# HTTPS server with client certificate authentication
server {
    listen 443 ssl;
    server_name localhost keycloak.local;

    # Server certificate
    ssl_certificate /etc/nginx/certs/server.crt.pem;
    ssl_certificate_key /etc/nginx/certs/server.key.pem;

    # CA certificate for client verification
    ssl_client_certificate /etc/nginx/ca/ca.crt.pem;

    # Accept any client certificate without CA verification (like SSH keys)
    ssl_verify_client optional_no_ca;
    ssl_verify_depth 2;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Proxy settings
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # -----------------------------------------------------------------------
    # OIDC / Phantom Token endpoints (handled by njs)
    # -----------------------------------------------------------------------

    location = /auth/login {
        js_content oidc.login;
    }

    location = /auth/callback {
        js_content oidc.callback;
    }

    location = /auth/logout {
        js_content oidc.logout;
    }

    location = /auth/me {
        js_content oidc.me;
    }

    # Internal auth subrequest — resolves session cookie or PAT to JWT
    location = /_auth {
        internal;
        js_content oidc.resolveToken;
    }

    # -----------------------------------------------------------------------
    # PAT management API — proxied to Keycloak PAT provider
    # Authenticated via session cookie (phantom token pattern)
    # -----------------------------------------------------------------------

    location /api/pat/ {
        auth_request /_auth;
        auth_request_set $access_token $sent_http_x_access_token;

        proxy_pass http://keycloak/realms/public/pat-api/;
        proxy_set_header Host $host;
        proxy_set_header Authorization "Bearer $access_token";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        error_page 401 = @unauthorized;
    }

    # Block direct access to PAT exchange endpoint (only nginx njs calls it internally)
    location = /realms/public/pat-api/tokens/exchange {
        deny all;
        return 403 '{"error":"Direct access not allowed"}';
    }

    # -----------------------------------------------------------------------
    # Backend API — phantom token injection
    # nginx resolves session, introspects lightweight token, passes full
    # claims via X-Token-Claims header. Backends read claims from header.
    # -----------------------------------------------------------------------

    location /api/ {
        auth_request /_auth;
        auth_request_set $access_token $sent_http_x_access_token;
        auth_request_set $token_claims $sent_http_x_token_claims;

        proxy_pass http://backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Lightweight JWT for signature verification
        proxy_set_header Authorization "Bearer $access_token";
        # Full introspected claims — backends read this instead of decoding the JWT
        proxy_set_header X-Token-Claims $token_claims;

        # Return 401 JSON instead of nginx default error page
        error_page 401 = @unauthorized;
    }

    location @unauthorized {
        default_type application/json;
        return 401 '{"error":"Not authenticated"}';
    }

    # -----------------------------------------------------------------------
    # UI — React SPA
    # -----------------------------------------------------------------------

    location /ui/ {
        proxy_pass http://ui/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -----------------------------------------------------------------------
    # Keycloak — everything else
    # -----------------------------------------------------------------------

    location / {
        proxy_pass http://keycloak;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;

        # Pass client certificate info to Keycloak
        proxy_set_header SSL_CLIENT_CERT $ssl_client_escaped_cert;
        proxy_set_header SSL_CLIENT_CERT_CHAIN_0 $ssl_client_escaped_cert;
        proxy_set_header SSL_CLIENT_VERIFY $ssl_client_verify;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://keycloak/health;
        proxy_set_header Host $host;
    }
}
