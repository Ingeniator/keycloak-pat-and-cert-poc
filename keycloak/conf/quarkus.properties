# Keycloak Quarkus Configuration
# These settings are applied at build time and runtime

# HTTP/HTTPS settings
quarkus.http.host=0.0.0.0
quarkus.http.port=8080

# HTTPS settings for client certificate
quarkus.http.ssl.client-auth=REQUEST

# Logging
quarkus.log.level=INFO
quarkus.log.category."org.keycloak".level=INFO
quarkus.log.category."com.example.keycloak".level=DEBUG

# Database connection pool
quarkus.datasource.jdbc.min-size=5
quarkus.datasource.jdbc.max-size=20

# Enable metrics (optional)
# quarkus.micrometer.enabled=true
# quarkus.micrometer.export.prometheus.enabled=true
