# HTTP redirect to HTTPS
server {
    listen 80;
    server_name localhost keycloak.local;
    return 301 https://$host$request_uri;
}

# HTTPS server with client certificate authentication
server {
    listen 443 ssl;
    server_name localhost keycloak.local;

    # Server certificate
    ssl_certificate /etc/nginx/certs/server.crt.pem;
    ssl_certificate_key /etc/nginx/certs/server.key.pem;

    # CA certificate for client verification
    ssl_client_certificate /etc/nginx/ca/ca.crt.pem;

    # Request client certificate but don't require it (optional)
    # This allows both certificate and password authentication
    ssl_verify_client optional;
    ssl_verify_depth 2;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Proxy settings
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    location / {
        proxy_pass http://keycloak;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;

        # Pass client certificate info to Keycloak (Keycloak nginx provider expects these headers)
        proxy_set_header SSL_CLIENT_CERT $ssl_client_escaped_cert;
        proxy_set_header SSL_CLIENT_CERT_CHAIN_0 $ssl_client_escaped_cert;
        proxy_set_header SSL_CLIENT_VERIFY $ssl_client_verify;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://keycloak/health;
        proxy_set_header Host $host;
    }
}
