user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

load_module modules/ngx_http_js_module.so;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Enable underscores in header names (required for SSL_CLIENT_CERT)
    underscores_in_headers on;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'ssl_client_s_dn="$ssl_client_s_dn" '
                      'ssl_client_verify="$ssl_client_verify"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # DNS resolver for njs ngx.fetch() — Docker internal DNS
    resolver 127.0.0.11 valid=10s;

    # njs OIDC module
    js_path /etc/nginx/njs/;
    js_import oidc from oidc.js;

    # Shared memory for introspection cache only (no sessions — tokens live in cookies)
    js_shared_dict_zone zone=cache:2m timeout=60s evict;

    # Upstream for Keycloak
    upstream keycloak {
        server keycloak:8080;
    }

    # Upstream for UI
    upstream ui {
        server keycloak-ui:80;
    }

    # Upstream for backend API
    upstream backend {
        server keycloak-backend:3001;
    }

    include /etc/nginx/conf.d/*.conf;
}
