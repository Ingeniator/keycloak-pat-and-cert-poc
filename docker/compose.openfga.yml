# Layer 4: OpenFGA Fine-Grained Authorization
# Adds OpenFGA server, its PostgreSQL database, and seeds the authorization model.
# Overrides the backend to enable OpenFGA integration.

services:
  openfga-postgres:
    image: postgres:15-alpine
    container_name: openfga-postgres
    environment:
      POSTGRES_DB: ${OPENFGA_POSTGRES_DB:-openfga}
      POSTGRES_USER: ${OPENFGA_POSTGRES_USER:-openfga}
      POSTGRES_PASSWORD: ${OPENFGA_POSTGRES_PASSWORD:-openfga_password}
    volumes:
      - openfga_postgres_data:/var/lib/postgresql/data
    networks:
      - keycloak-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openfga"]
      interval: 10s
      timeout: 5s
      retries: 5

  openfga-migrate:
    image: openfga/openfga:latest
    container_name: openfga-migrate
    command: migrate
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://${OPENFGA_POSTGRES_USER:-openfga}:${OPENFGA_POSTGRES_PASSWORD:-openfga_password}@openfga-postgres:5432/${OPENFGA_POSTGRES_DB:-openfga}?sslmode=disable
    depends_on:
      openfga-postgres:
        condition: service_healthy
    networks:
      - keycloak-network

  openfga:
    image: openfga/openfga:latest
    container_name: openfga
    command: run
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://${OPENFGA_POSTGRES_USER:-openfga}:${OPENFGA_POSTGRES_PASSWORD:-openfga_password}@openfga-postgres:5432/${OPENFGA_POSTGRES_DB:-openfga}?sslmode=disable
      OPENFGA_HTTP_ADDR: 0.0.0.0:8081
      OPENFGA_GRPC_ADDR: 0.0.0.0:8082
    ports:
      - "8081:8081"
      - "8082:8082"
    depends_on:
      openfga-migrate:
        condition: service_completed_successfully
    networks:
      - keycloak-network
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=localhost:8082"]
      interval: 10s
      timeout: 5s
      retries: 5

  openfga-init:
    build: ../openfga
    container_name: openfga-init
    environment:
      OPENFGA_API_URL: http://openfga:8081
    depends_on:
      openfga:
        condition: service_healthy
    networks:
      - keycloak-network

  # Override backend to enable OpenFGA authorization
  backend:
    environment:
      OPENFGA_API_URL: http://openfga:8081
    depends_on:
      keycloak:
        condition: service_healthy
      openfga:
        condition: service_healthy

volumes:
  openfga_postgres_data:
