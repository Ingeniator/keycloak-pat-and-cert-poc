services:
  postgres:
    image: postgres:15-alpine
    container_name: keycloak-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-keycloak}
      POSTGRES_USER: ${POSTGRES_USER:-keycloak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-keycloak_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - keycloak-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    environment:
      # Database
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-keycloak}
      KC_DB_USERNAME: ${POSTGRES_USER:-keycloak}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-keycloak_password}

      # Admin credentials
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}

      # Proxy settings (behind nginx)
      KC_PROXY: edge
      KC_HOSTNAME: ${KC_HOSTNAME:-localhost}
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: true
      KC_HTTP_ENABLED: true

      # X.509 Client Certificate Authentication
      KC_HTTPS_CLIENT_AUTH: request
      KC_HTTPS_CERTIFICATE_FILE: /opt/keycloak/certs/server/server.crt.pem
      KC_HTTPS_CERTIFICATE_KEY_FILE: /opt/keycloak/certs/server/server.key.pem
      KC_HTTPS_TRUST_STORE_FILE: /opt/keycloak/certs-root/truststore.jks
      KC_HTTPS_TRUST_STORE_PASSWORD: ${TRUSTSTORE_PASSWORD:-changeit}

      # Features (declarative-user-profile is now built-in)
      KC_FEATURES: preview

      # Logging
      KC_LOG_LEVEL: INFO,com.example.keycloak:DEBUG,org.keycloak.services.x509:DEBUG

      # X.509 Certificate Lookup from Nginx headers
      KC_SPI_X509CERT_LOOKUP_PROVIDER: nginx
      KC_SPI_X509CERT_LOOKUP_NGINX_SSL_CLIENT_CERT: SSL_CLIENT_CERT
      KC_SPI_X509CERT_LOOKUP_NGINX_SSL_CERT_CHAIN_PREFIX: SSL_CLIENT_CERT_CHAIN

      # Trusted CA for email fallback authentication (optional)
      # If set, users with CA-signed certs can authenticate by email without pre-registering
      X509_TRUSTED_CA_CERT_PATH: /opt/keycloak/certs/ca/ca.crt.pem

    ports:
      - "8080:8080"

    command:
      - start-dev
      - --spi-x509cert-lookup-nginx-ssl-client-cert=SSL_CLIENT_CERT

    volumes:
      - ./keycloak/providers:/opt/keycloak/providers:ro
      - ./keycloak/conf/quarkus.properties:/opt/keycloak/conf/quarkus.properties:ro
      - ./certs/server:/opt/keycloak/certs/server:ro
      - ./certs/ca:/opt/keycloak/certs/ca:ro
      - ./certs:/opt/keycloak/certs-root:ro

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - keycloak-network

    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e 'GET /health/ready HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n' >&3;if [ $? -eq 0 ]; then echo 'Healthcheck Successful';exit 0;else echo 'Healthcheck Failed';exit 1;fi;"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  keycloak-config-cli:
    image: adorsys/keycloak-config-cli:6.5.0-24
    container_name: keycloak-config-cli
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_USER: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KEYCLOAK_AVAILABILITYCHECK_ENABLED: "true"
      KEYCLOAK_AVAILABILITYCHECK_TIMEOUT: "120s"
      IMPORT_FILES_LOCATIONS: "/config/*"
      IMPORT_VARSUBSTITUTION_ENABLED: "true"
      REALM_NAME: ${REALM_NAME:-x509-demo}
      CLIENT_ID: ${CLIENT_ID:-x509-demo-app}
    volumes:
      - ./keycloak/migrations/config-cli:/config:ro
    depends_on:
      keycloak:
        condition: service_healthy
    networks:
      - keycloak-network

  openfga-postgres:
    image: postgres:15-alpine
    container_name: openfga-postgres
    environment:
      POSTGRES_DB: ${OPENFGA_POSTGRES_DB:-openfga}
      POSTGRES_USER: ${OPENFGA_POSTGRES_USER:-openfga}
      POSTGRES_PASSWORD: ${OPENFGA_POSTGRES_PASSWORD:-openfga_password}
    volumes:
      - openfga_postgres_data:/var/lib/postgresql/data
    networks:
      - keycloak-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openfga"]
      interval: 10s
      timeout: 5s
      retries: 5

  openfga-migrate:
    image: openfga/openfga:latest
    container_name: openfga-migrate
    command: migrate
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://${OPENFGA_POSTGRES_USER:-openfga}:${OPENFGA_POSTGRES_PASSWORD:-openfga_password}@openfga-postgres:5432/${OPENFGA_POSTGRES_DB:-openfga}?sslmode=disable
    depends_on:
      openfga-postgres:
        condition: service_healthy
    networks:
      - keycloak-network

  openfga:
    image: openfga/openfga:latest
    container_name: openfga
    command: run
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://${OPENFGA_POSTGRES_USER:-openfga}:${OPENFGA_POSTGRES_PASSWORD:-openfga_password}@openfga-postgres:5432/${OPENFGA_POSTGRES_DB:-openfga}?sslmode=disable
      OPENFGA_HTTP_ADDR: 0.0.0.0:8081
      OPENFGA_GRPC_ADDR: 0.0.0.0:8082
    ports:
      - "8081:8081"
      - "8082:8082"
    depends_on:
      openfga-migrate:
        condition: service_completed_successfully
    networks:
      - keycloak-network
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=localhost:8082"]
      interval: 10s
      timeout: 5s
      retries: 5

  openfga-init:
    build: ./openfga
    container_name: openfga-init
    environment:
      OPENFGA_API_URL: http://openfga:8081
    depends_on:
      openfga:
        condition: service_healthy
    networks:
      - keycloak-network

  backend:
    build: ./backend
    container_name: keycloak-backend
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      REALM: public
      OPENFGA_API_URL: http://openfga:8081
    depends_on:
      keycloak:
        condition: service_healthy
      openfga:
        condition: service_healthy
    networks:
      - keycloak-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/hello 2>&1 | head -1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  ui:
    build: ./ui
    container_name: keycloak-ui
    ports:
      - "5173:80"
    depends_on:
      keycloak:
        condition: service_healthy
    networks:
      - keycloak-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ 2>&1 | head -1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  nginx:
    build: ./gateway
    container_name: nginx-proxy
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./gateway/conf.d:/etc/nginx/conf.d:ro
      - ./gateway/njs/oidc.js:/etc/nginx/njs/oidc.js.template:ro
      - ./certs/server:/etc/nginx/certs:ro
      - ./certs/ca:/etc/nginx/ca:ro
    depends_on:
      - keycloak
      - ui
      - backend
    networks:
      - keycloak-network

networks:
  keycloak-network:
    driver: bridge

volumes:
  postgres_data:
  openfga_postgres_data:
