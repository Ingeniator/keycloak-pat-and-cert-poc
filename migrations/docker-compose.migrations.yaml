# Docker Compose override for development watch mode
#
# The main keycloak-config-cli service is in docker-compose.yml and runs
# automatically on `docker compose up`. This override adds a watch mode
# service that re-applies config on file changes during development.
#
# Usage:
#   docker compose -f docker-compose.yml -f migrations/docker-compose.migrations.yaml \
#       run --rm keycloak-config-cli-watch

services:
  # Watch mode for development - re-applies on file changes
  keycloak-config-cli-watch:
    image: adorsys/keycloak-config-cli:6.5.0-24
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_USER: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KEYCLOAK_AVAILABILITYCHECK_ENABLED: "true"
      IMPORT_FILES_LOCATIONS: "/config/*"
      IMPORT_VARSUBSTITUTION_ENABLED: "true"
      REALM_NAME: ${REALM_NAME:-x509-demo}
      CLIENT_ID: ${CLIENT_ID:-x509-demo-app}
    volumes:
      - ./config-cli:/config:ro
    entrypoint: >
      sh -c "
        while true; do
          java -jar /app/keycloak-config-cli.jar || true
          echo 'Waiting for changes...'
          sleep 10
        done
      "
    depends_on:
      keycloak:
        condition: service_healthy
    networks:
      - keycloak-network

networks:
  keycloak-network:
    external: true
    name: keycloak_x509_demo_keycloak-network
