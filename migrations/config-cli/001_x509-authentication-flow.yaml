# Migration: 001_x509-authentication-flow
# Description: Add X.509 certificate authentication flow
# Author: DevOps Team
# Date: 2024-01-01
#
# This migration adds:
# - x509-browser-forms subflow (custom + built-in X.509 + password fallback)
# - x509-browser-flow main flow
# - Authenticator configurations for fingerprint and built-in X.509
#
# Rollback: Delete the authentication flows via Admin Console or API

realm: "$(env:REALM_NAME:-x509-demo)"
enabled: true

# Authentication flows are idempotent - will update if exists
authenticationFlows:
  # Subflow: handles the actual authentication methods
  - alias: "x509-browser-forms"
    description: "Username, password, and X.509 certificate form"
    providerId: "basic-flow"
    topLevel: false
    builtIn: false
    authenticationExecutions:
      # X.509 fingerprint/email authentication (custom provider)
      - authenticator: "x509-user-attribute-authenticator"
        authenticatorFlow: false
        requirement: "ALTERNATIVE"
        priority: 0
        authenticatorConfig: "x509-fingerprint-config"
      # Built-in X.509 client certificate authenticator
      - authenticator: "auth-x509-client-username-form"
        authenticatorFlow: false
        requirement: "ALTERNATIVE"
        priority: 1
        authenticatorConfig: "x509-config"
      # Fallback to username/password
      - authenticator: "auth-username-password-form"
        authenticatorFlow: false
        requirement: "ALTERNATIVE"
        priority: 2

  # Main flow: entry point for browser authentication
  - alias: "x509-browser-flow"
    description: "Browser flow with X.509 certificate support"
    providerId: "basic-flow"
    topLevel: true
    builtIn: false
    authenticationExecutions:
      # Check for existing session cookie
      - authenticator: "auth-cookie"
        authenticatorFlow: false
        requirement: "ALTERNATIVE"
        priority: 0
      # Kerberos (disabled by default)
      - authenticator: "auth-spnego"
        authenticatorFlow: false
        requirement: "DISABLED"
        priority: 1
      # Identity provider redirector
      - authenticator: "identity-provider-redirector"
        authenticatorFlow: false
        requirement: "ALTERNATIVE"
        priority: 2
      # Reference to our subflow
      - authenticatorFlow: true
        requirement: "ALTERNATIVE"
        priority: 3
        flowAlias: "x509-browser-forms"

# Authenticator configurations
authenticatorConfig:
  # Custom fingerprint-based authenticator config
  - alias: "x509-fingerprint-config"
    config:
      emailFallbackEnabled: "true"
      autoRegisterCertOnEmailMatch: "true"
      # trustedCaCertificate: "" # Use X509_TRUSTED_CA_CERT_PATH env var instead

  # Built-in X.509 client certificate authenticator config
  - alias: "x509-config"
    config:
      x509-cert-auth.mapper-selection.user-attribute-name: "x509_certificate_subject_dn"
      x509-cert-auth.mapping-source-selection: "Subject's Common Name"
      x509-cert-auth.regular-expression: "(.*)"
      x509-cert-auth.crl-checking-enabled: "false"
      x509-cert-auth.ocsp-checking-enabled: "false"
      x509-cert-auth.timestamp-validation-enabled: "true"
      x509-cert-auth.confirmation-page-disallowed: "false"
      x509-cert-auth.revalidate-certificate-enabled: "false"

# Bind as default browser flow
browserFlow: "x509-browser-flow"
